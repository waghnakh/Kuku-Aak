<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaku & Kuku ❤️ Our Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- ALL YOUR BEAUTIFUL STYLES REMAIN THE SAME --- */
        body { background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%); min-height: 100vh; margin: 0; font-family: 'Quicksand', sans-serif; text-align: center; color: #d81b60; overflow-x: hidden; position: relative; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #fce4ec 0%, #f06292 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .login-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
        .login-box h2 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin-bottom: 20px; color: #c2185b; }
        input[type="password"] { width: 80%; padding: 12px; border: 2px solid #ff80ab; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 1.1rem; outline: none; }
        #main-content { display: none; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-top: 40px; color: #c2185b; animation: heartbeat 2s infinite; }
        @keyframes heartbeat { 0%, 28%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.1); } }
        .container { background: rgba(255, 255, 255, 0.85); border-radius: 25px; padding: 30px; margin: 20px auto; max-width: 700px; box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15); position: relative; z-index: 10; }
        .clocks, .timer { font-size: 1.1rem; font-weight: bold; margin: 15px 0; color: #ad1457; display: flex; justify-content: space-around; }
        .action-btn { background: linear-gradient(45deg, #ff4081, #ff80ab); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-top: 25px; padding: 10px; }
        .gallery-item { position: relative; width: 160px; height: 160px; margin: auto; }
        .gallery img, .gallery video { width: 160px; height: 160px; object-fit: cover; cursor: pointer; clip-path: path('M12 4.419c-2.826-2.795-7.192-2.795-10.017 0-2.825 2.793-2.825 7.329 0 10.122l8.803 8.71 1.214 1.21 1.214-1.21 8.803-8.71c2.825-2.793 2.825-7.329 0-10.122-2.825-2.795-7.191-2.795-10.017 0z'); transition: 0.4s ease-in-out; background: #fff; }
        .bg-heart { position: fixed; bottom: -50px; color: rgba(255, 105, 180, 0.4); font-size: 1.5rem; pointer-events: none; z-index: 1; animation: floatAndSway 12s infinite ease-in; }
        @keyframes floatAndSway { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; } 100% { transform: translateY(-110vh) translateX(-50px) rotate(360deg); opacity: 0; } }
        #imageModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(8px); cursor: pointer; align-items: center; justify-content: center; flex-direction: column; opacity: 0; transition: opacity 0.3s ease; }
        #imageModal.active { display: flex; opacity: 1; }
        .modal-media { max-width: 90%; max-height: 80%; border-radius: 15px; border: 5px solid white; }
    </style>
</head>
<body onclick="createBurst(event)">

    <div id="login-overlay">
        <div class="login-box">
            <h2>Our Private Space</h2>
            <input type="password" id="passInput" placeholder="Password...">
            <br>
            <button class="action-btn" onclick="checkPassword()">Unlock Memories</button>
            <p id="fail-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;">Oops! ❤️</p>
        </div>
    </div>

    <div id="main-content">
        <h1>Aaku & Kuku</h1>
        <div class="container">
            <div class="clocks">
                <div><p>Aaku (NL)</p><div id="clock1">...</div></div>
                <div style="font-size: 1.5rem;">✈️</div>
                <div><p>Kuku (IND)</p><div id="clock2">...</div></div>
            </div>
            <div class="timer" id="love-timer">...</div>
        </div>

        <div class="container">
            <h2>Add a Memory 📸</h2>
            <input type="file" id="photoInput" accept="image/*,video/*">
            <br>
            <button class="action-btn" id="uploadBtn" onclick="uploadPhoto()">Save to Drive</button>
            <p id="status" style="font-size: 0.9rem; margin-top: 10px; font-weight: bold;"></p>
        </div>

        <div class="container">
            <h2>Our Heartfelt Gallery</h2>
            <div class="gallery" id="photo-gallery"></div>
        </div>
    </div>

    <div id="imageModal" onclick="closeMedia()">
        <div id="modal-container" style="display:contents;"></div>
        <p style="color: white; margin-top: 20px;">Click to close</p>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoYX1q_ItD0rn5ULK-6Ytvc9udAJgtVyKZNUX3C_uRzwM3SVbbwWHlMtmpVaFqldf3Aw/exec";
        const SECRET_PASSWORD = "kukuaaku_2026";

        function checkPassword() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('login-overlay').style.transform = "translateY(-100%)";
                document.getElementById('main-content').style.display = "block";
                loadGallery();
            } else {
                document.getElementById('fail-msg').style.display = "block";
            }
        }

        function uploadPhoto() {
            const file = document.getElementById('photoInput').files[0];
            const status = document.getElementById('status');
            if (!file) return alert("Select a file! 💕");
            status.innerText = "Sending... ✨";
            const reader = new FileReader();
            reader.onload = function(e) {
                fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ base64: e.target.result, type: file.type, name: file.name })
                })
                .then(() => { status.innerText = "Saved! 💖"; loadGallery(); });
            };
            reader.readAsDataURL(file);
        }

        function loadGallery() {
            const gallery = document.getElementById('photo-gallery');
            gallery.innerHTML = "<p>Loading...</p>";
            fetch(WEB_APP_URL)
                .then(r => r.json())
                .then(files => {
                    gallery.innerHTML = "";
                    files.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        
                        // --- THE REPAIRED LINK FORMAT ---
                        const displayUrl = `https://lh3.googleusercontent.com/d/${file.id}`;
                        
                        let media;
                        // Use a fallback check if mimeType is missing
                        if (file.mimeType && file.mimeType.startsWith('video/')) {
                            media = document.createElement('video');
                            media.src = displayUrl;
                            media.muted = true;
                            media.loop = true;
                        } else {
                            media = document.createElement('img');
                            media.src = displayUrl;
                        }

                        media.onclick = (e) => { e.stopPropagation(); openMedia(displayUrl, file.mimeType && file.mimeType.startsWith('video/')); };
                        item.appendChild(media);
                        gallery.appendChild(item);
                    });
                });
        }

        function openMedia(url, isVideo) {
            const modal = document.getElementById('imageModal');
            const container = document.getElementById('modal-container');
            container.innerHTML = isVideo ? `<video src="${url}" controls autoplay class="modal-media"></video>` : `<img src="${url}" class="modal-media">`;
            modal.classList.add('active');
        }

        function closeMedia() { document.getElementById('imageModal').classList.remove('active'); }

        // Standard Hearts/Clocks
        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'bg-heart'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 12000);
        }
        setInterval(spawnHeart, 800);

        const startDate = new Date("2026-04-04T00:00:00").getTime();
        setInterval(() => {
            const diff = new Date().getTime() - startDate;
            document.getElementById("love-timer").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24)) + "d " + Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)) + "h " + Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)) + "m " + Math.floor((diff % (1000 * 60)) / 1000) + "s";
            document.getElementById("clock1").innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
            document.getElementById("clock2").innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
        }, 1000);
    </script>
</body>
</html>
