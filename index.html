<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aakash & Kuku ❤️ Our Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            text-align: center;
            color: #d81b60;
            overflow-x: hidden;
            position: relative;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-top: 40px;
            color: #c2185b;
            animation: heartbeat 2s infinite;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes heartbeat {
            0%, 28%, 70% { transform: scale(1); }
            14%, 42% { transform: scale(1.1); }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 25px;
            padding: 30px;
            margin: 20px auto;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15);
            position: relative;
            z-index: 10;
        }

        .clocks, .timer {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 15px 0;
            color: #ad1457;
            display: flex;
            justify-content: space-around;
        }

        .action-btn {
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Quicksand', sans-serif;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }

        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5); }

        /* --- GALLERY GRID --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 25px;
            padding: 10px;
        }

        .gallery img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            cursor: pointer;
            clip-path: path('M12 4.419c-2.826-2.795-7.192-2.795-10.017 0-2.825 2.793-2.825 7.329 0 10.122l8.803 8.71 1.214 1.21 1.214-1.21 8.803-8.71c2.825-2.793 2.825-7.329 0-10.122-2.825-2.795-7.191-2.795-10.017 0z');
            transition: 0.4s ease-in-out;
            background: #fff;
        }

        .gallery img:hover { transform: scale(1.15) rotate(5deg); }

        /* --- THE MOVING FLOATING HEARTS --- */
        .bg-heart {
            position: fixed;
            bottom: -50px;
            color: rgba(255, 105, 180, 0.4);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1;
            animation: floatAndSway 12s infinite ease-in;
        }

        @keyframes floatAndSway {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(-50vh) translateX(50px) rotate(180deg); }
            100% { transform: translateY(-110vh) translateX(-50px) rotate(360deg); opacity: 0; }
        }

        /* --- IMAGE POPUP --- */
        #imageModal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            cursor: pointer; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }

        #imageModal.active { display: flex; opacity: 1; }
        #fullImage { max-width: 90%; max-height: 85%; border-radius: 15px; border: 5px solid white; box-shadow: 0 0 30px rgba(255, 64, 129, 0.5); }
    </style>
</head>
<body onclick="createBurst(event)">

    <h1>Aakash & Kuku</h1>

    <div class="container">
        <div class="clocks">
            <div><p>Aakash (NL)</p><div id="clock1">...</div></div>
            <div style="font-size: 1.5rem;">✈️</div>
            <div><p>Kuku (Bhopal)</p><div id="clock2">...</div></div>
        </div>
        <div class="timer" id="love-timer">Loading our time...</div>
    </div>

    <div class="container">
        <h2>Add a Memory 📸</h2>
        <input type="file" id="photoInput" accept="image/*" style="margin-bottom: 10px;">
        <br>
        <button class="action-btn" id="uploadBtn" onclick="uploadPhoto()">Upload to our Drive</button>
        <p id="status" style="font-size: 0.9rem; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div class="container">
        <h2>Our Heartfelt Gallery</h2>
        <p style="font-size: 0.8rem; margin-top: -10px; font-style: italic;">(Click a heart to see full image)</p>
        <div class="gallery" id="photo-gallery"></div>
    </div>

    <div id="imageModal" onclick="closeImage()">
        <img id="fullImage" src="">
        <p style="color: white; position: absolute; bottom: 20px;">Click anywhere to close</p>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEn6FsIWzlskDrWvQAatMPMxUkR32k_YClPoHiBFkhvlK5szl3oYYh_3JXeBdwDDWHgQ/exec";

        function uploadPhoto() {
            const file = document.getElementById('photoInput').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');
            if (!file) return alert("Select a photo first! 💕");
            status.innerText = "Sending to our Drive... ✨";
            btn.disabled = true;
            const reader = new FileReader();
            reader.onload = function(e) {
                fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ base64: e.target.result, type: file.type, name: file.name })
                })
                .then(r => r.json())
                .then(() => {
                    status.innerText = "Saved forever! 💖";
                    btn.disabled = false;
                    document.getElementById('photoInput').value = "";
                    loadGallery(); 
                });
            };
            reader.readAsDataURL(file);
        }

        function loadGallery() {
            const gallery = document.getElementById('photo-gallery');
            gallery.innerHTML = "<p>Loading memories...</p>";
            fetch(WEB_APP_URL)
                .then(r => r.json())
                .then(files => {
                    gallery.innerHTML = "";
                    files.forEach(file => {
                        const img = document.createElement('img');
                        const displayUrl = `https://lh3.googleusercontent.com/d/${file.id}`;
                        img.src = displayUrl;
                        img.onclick = (e) => { e.stopPropagation(); openImage(displayUrl); };
                        gallery.appendChild(img);
                    });
                });
        }

        function openImage(url) { document.getElementById('fullImage').src = url; document.getElementById('imageModal').classList.add('active'); }
        function closeImage() { document.getElementById('imageModal').classList.remove('active'); }

        function spawnHeart() {
            const hearts = ['❤️', '💖', '💗', '💓', '💕'];
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            heart.style.animationDuration = (Math.random() * 5 + 10) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 12000);
        }
        setInterval(spawnHeart, 800);

        function createBurst(e) {
            for(let i=0; i<8; i++) {
                const h = document.createElement('div');
                h.innerHTML = '❤️';
                h.style.position = 'fixed';
                h.style.left = e.clientX + 'px';
                h.style.top = e.clientY + 'px';
                h.style.pointerEvents = 'none';
                h.style.transition = 'all 1s ease-out';
                h.style.zIndex = '3000';
                document.body.appendChild(h);
                const destX = e.clientX + (Math.random() - 0.5) * 300;
                const destY = e.clientY + (Math.random() - 0.5) * 300;
                setTimeout(() => {
                    h.style.transform = `translate(${destX - e.clientX}px, ${destY - e.clientY}px) scale(0)`;
                    h.style.opacity = '0';
                }, 10);
                setTimeout(() => h.remove(), 1000);
            }
        }

        const startDate = new Date("2026-04-04T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - startDate;
            document.getElementById("love-timer").innerHTML = 
                Math.floor(diff / (1000 * 60 * 60 * 24)) + "d " + 
                Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)) + "h " + 
                Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)) + "m " + 
                Math.floor((diff % (1000 * 60)) / 1000) + "s";
            
            const opts = { hour: '2-digit', minute: '2-digit' };
            document.getElementById("clock1").innerText = new Date().toLocaleTimeString('en-US', { ...opts, timeZone: 'Europe/Amsterdam' });
            document.getElementById("clock2").innerText = new Date().toLocaleTimeString('en-US', { ...opts, timeZone: 'Asia/Kolkata' });
        }, 1000);

        loadGallery();
    </script>
</body>
</html>
